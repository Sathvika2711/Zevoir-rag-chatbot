<!DOCTYPE html>
<!--
=============================================================
  index.html — THE CHAT FRONTEND
=============================================================
  This is what the user sees in their browser.
  It sends messages to Flask and shows replies.

  HOW IT CONNECTS TO FLASK:
    User types message → JS sends POST to /chat
    Flask processes with RAG → returns reply
    JS shows reply as chat bubble
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Zevoir Genie</title>
  <style>
    /* All font-family set to Arial as requested */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }

    /* ── CSS Variables — light/dark mode ───────────────────── */
    :root {
      --bg-page:       #f0f2f5;
      --bg-app:        #ffffff;
      --bg-window:     #f0f2f5;
      --bg-bot:        #ffffff;
      --cl-bot:        #222222;
      --bg-input-area: #ffffff;
      --border:        #dde0ea;
      --cl-chip:       #444444;
      --bg-chip:       #ffffff;
      --shadow:        0 2px 8px rgba(0,0,0,0.08);
      --bg-clear:      rgba(255,255,255,0.15);
      --cl-clear:      #ffffff;
      --cl-placeholder:#bbbbbb;
    }
    body.dark {
      --bg-page:       #0d0d1a;
      --bg-app:        #1a1a2e;
      --bg-window:     #111128;
      --bg-bot:        #22224a;
      --cl-bot:        #e8e8ff;
      --bg-input-area: #1a1a2e;
      --border:        #33336a;
      --cl-chip:       #ccccff;
      --bg-chip:       #22224a;
      --shadow:        0 2px 12px rgba(0,0,0,0.4);
      --bg-clear:      rgba(255,80,80,0.2);   /* red tint in dark mode */
      --cl-clear:      #ff8888;               /* red text in dark mode */
      --cl-placeholder:#666699;
    }

    body {
      background: var(--bg-page);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      transition: background 0.3s;
    }

    /* ── CHAT APP CONTAINER ─────────────────────────────────── */
    .chat-app {
      width: 440px; max-width: 100%;
      height: 720px; max-height: 96vh;
      background: var(--bg-app);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: background 0.3s;
    }

    /* ── HEADER ─────────────────────────────────────────────── */
    .header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 18px 18px 14px;
      display: flex; align-items: center; gap: 12px;
    }
    /* Bot avatar in header */
    .bot-avatar {
      width: 46px; height: 46px;
      border-radius: 14px;
      background: linear-gradient(135deg, #e94560, #0f3460);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; color: white; font-weight: bold;
      flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.2);
    }
    .brand { flex: 1; }
    .brand-name { color: #fff; font-weight: 700; font-size: 1rem; }
    .brand-tag  { color: #a0b4c8; font-size: 0.72rem; margin-top: 2px; }
    .header-actions { display: flex; gap: 7px; align-items: center; }
    .pulse {
      width: 9px; height: 9px; background: #2ecc71;
      border-radius: 50%; animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* Mode toggle button */
    .mode-btn {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff; width: 34px; height: 34px;
      border-radius: 50%; cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .mode-btn:hover { background: rgba(255,255,255,0.25); }

    /* Clear button — highlighted in dark mode via CSS variable */
    .clear-btn {
      background: var(--bg-clear);
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--cl-clear);
      padding: 6px 13px; border-radius: 20px;
      cursor: pointer; font-size: 0.75rem; font-weight: 600;
      transition: background 0.2s, color 0.2s;
    }
    .clear-btn:hover { opacity: 0.8; }

    /* ── QUICK CHIPS ────────────────────────────────────────── */
    .chips {
      padding: 9px 12px; display: flex; gap: 6px; flex-wrap: wrap;
      background: var(--bg-window);
      border-bottom: 1px solid var(--border);
      transition: background 0.3s;
    }
    .chip {
      background: var(--bg-chip); border: 1.5px solid var(--border);
      border-radius: 20px; padding: 5px 12px;
      font-size: 0.74rem; cursor: pointer; color: var(--cl-chip);
      transition: all 0.2s; white-space: nowrap;
    }
    .chip:hover { background: #e94560; color: #fff; border-color: #e94560; }

    /* ── CHAT WINDOW ────────────────────────────────────────── */
    .chat-window {
      flex: 1; overflow-y: auto;
      padding: 16px 14px; display: flex;
      flex-direction: column; gap: 13px;
      background: var(--bg-window);
      transition: background 0.3s;
    }
    .chat-window::-webkit-scrollbar { width: 4px; }
    .chat-window::-webkit-scrollbar-thumb { background: rgba(100,100,100,0.3); border-radius: 4px; }

    /* ── SOURCE BADGE (shows if RAG or rule-based) ──────────── */
    /* Tiny label under bot messages showing the source */
    .source-badge {
      font-size: 0.68rem; color: #aaa;
      margin-top: 3px; margin-left: 42px;
      font-style: italic;
    }

    /* ── MESSAGE ROWS ───────────────────────────────────────── */
    .msg-row { display: flex; gap: 9px; align-items: flex-end; }
    .msg-row.user { flex-direction: row-reverse; }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: bold; flex-shrink: 0;
      color: white;
    }
    .avatar.bot  { background: linear-gradient(135deg, #1a1a2e, #e94560); }
    .avatar.user { background: linear-gradient(135deg, #e94560, #c0392b); }
    .bubble {
      max-width: 73%; padding: 11px 14px; border-radius: 18px;
      font-size: 0.875rem; line-height: 1.6; white-space: pre-wrap;
      transition: background 0.3s, color 0.3s;
    }
    .bubble.bot {
      background: var(--bg-bot); color: var(--cl-bot);
      border-bottom-left-radius: 4px; box-shadow: var(--shadow);
    }
    .bubble.user {
      background: linear-gradient(135deg, #e94560, #c0392b);
      color: white; border-bottom-right-radius: 4px;
    }

    /* ── TYPING DOTS ────────────────────────────────────────── */
    .typing { display: flex; gap: 5px; padding: 3px 0; }
    .typing span {
      width: 8px; height: 8px; background: #aaa;
      border-radius: 50%; animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100%{transform:translateY(0)}
      30%{transform:translateY(-7px)}
    }

    /* ── INPUT BAR ──────────────────────────────────────────── */
    .input-area {
      padding: 13px 14px; border-top: 1px solid var(--border);
      display: flex; gap: 9px;
      background: var(--bg-input-area); transition: background 0.3s;
    }
    #user-input {
      flex: 1; border: 2px solid var(--border); border-radius: 25px;
      padding: 10px 18px; font-size: 16px; outline: none;
      background: var(--bg-window); color: var(--cl-bot);
      transition: border-color 0.2s, background 0.3s;
    }
    #user-input:focus { border-color: #e94560; }
    #user-input::placeholder { color: var(--cl-placeholder); }
    #send-btn {
      background: linear-gradient(135deg, #e94560, #c0392b);
      color: white; border: none; border-radius: 25px;
      padding: 10px 20px; font-weight: 700; cursor: pointer;
      font-size: 0.88rem; transition: opacity 0.2s;
    }
    #send-btn:hover    { opacity: 0.85; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="chat-app">

    <!-- ── HEADER ─────────────────────────────────────────────── -->
    <div class="header">
      <div class="bot-avatar">🤖</div>
      <div class="brand">
        <div class="brand-name">Zevoir Genie</div>
        <div class="brand-tag">Zevoir Support • Powered by RAG + Claude AI</div>
      </div>
      <div class="header-actions">
        <div class="pulse"></div>
        <button class="mode-btn" id="mode-btn" onclick="toggleMode()">🌙</button>
        <button class="clear-btn" onclick="clearChat()">✕ Clear</button>
      </div>
    </div>

    <!-- ── QUICK CHIPS ─────────────────────────────────────────── -->
    <div class="chips">
      <span class="chip" onclick="quickSend('Hi')">👋 Hi</span>
      <span class="chip" onclick="quickSend('What services do you offer?')">🚀 Services</span>
      <span class="chip" onclick="quickSend('What is your pricing?')">💰 Pricing</span>
      <span class="chip" onclick="quickSend('How does RAG work?')">🤖 RAG</span>
      <span class="chip" onclick="quickSend('I want a demo')">🎯 Demo</span>
      <span class="chip" onclick="quickSend('How do I contact support?')">📧 Support</span>
      <span class="chip" onclick="quickSend('1')">📋 Todos</span>
    </div>

    <!-- ── CHAT WINDOW ─────────────────────────────────────────── -->
    <div class="chat-window" id="chat-window"></div>

    <!-- ── INPUT BAR ───────────────────────────────────────────── -->
    <div class="input-area">
      <input type="text" id="user-input"
             placeholder="Ask anything about Zevoir, or type 1–10 for todos..."
             autocomplete="off"/>
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const chatWindow = document.getElementById("chat-window");
    const userInput  = document.getElementById("user-input");
    const sendBtn    = document.getElementById("send-btn");
    let isDark = false;

    // ── DARK/LIGHT TOGGLE ──────────────────────────────────────
    function toggleMode() {
      isDark = !isDark;
      document.body.classList.toggle("dark", isDark);
      document.getElementById("mode-btn").textContent = isDark ? "☀️" : "🌙";
    }

    // ── ADD MESSAGE BUBBLE ─────────────────────────────────────
    function addMsg(role, text, source) {
      const row = document.createElement("div");
      row.className = `msg-row ${role}`;

      const av = document.createElement("div");
      av.className = `avatar ${role}`;
      av.textContent = role === "bot" ? "Z" : "👤";

      const bub = document.createElement("div");
      bub.className = `bubble ${role}`;
      bub.textContent = text;

      row.appendChild(av);
      row.appendChild(bub);
      chatWindow.appendChild(row);

      // Show source badge under bot messages
      // Tells user if answer came from RAG documents or conversation flow
      if (role === "bot" && source) {
        const badge = document.createElement("div");
        badge.className = "source-badge";
        if (source === "rag")   badge.textContent = "📄 Answered from Zevoir documents";
        if (source === "todo")  badge.textContent = "🔗 Fetched from API";
        if (source === "flow")  badge.textContent = "💬 Conversation flow";
        chatWindow.appendChild(badge);
      }

      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // ── LOADING ANIMATION ──────────────────────────────────────
    function showLoading() {
      const row = document.createElement("div");
      row.id = "loading-row"; row.className = "msg-row bot";
      const av = document.createElement("div");
      av.className = "avatar bot"; av.textContent = "Z";
      const bub = document.createElement("div");
      bub.className = "bubble bot";
      bub.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
      row.appendChild(av); row.appendChild(bub);
      chatWindow.appendChild(row);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }
    function removeLoading() {
      document.getElementById("loading-row")?.remove();
    }

    // ── SEND MESSAGE ───────────────────────────────────────────
    async function sendMessage() {
      const msg = userInput.value.trim();
      if (!msg) return;

      addMsg("user", msg);
      userInput.value = "";
      userInput.disabled = true;
      sendBtn.disabled = true;
      showLoading();

      try {
        // Send to Flask backend
        const res  = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: msg })
        });
        const data = await res.json();
        removeLoading();
        addMsg("bot", data.reply, data.source);
      } catch (err) {
        removeLoading();
        addMsg("bot", "⚠️ Could not reach the server. Make sure app.py is running.", "error");
      }

      userInput.disabled = false;
      sendBtn.disabled = false;
      userInput.focus();
    }

    // ── QUICK CHIP SEND ────────────────────────────────────────
    function quickSend(text) {
      userInput.value = text;
      sendMessage();
    }

    // ── ENTER KEY ──────────────────────────────────────────────
    userInput.addEventListener("keydown", e => {
      if (e.key === "Enter") sendMessage();
    });

    // ── CLEAR CHAT ─────────────────────────────────────────────
    function clearChat() {
      chatWindow.innerHTML = "";
      setTimeout(() => {
        addMsg("bot", "Chat cleared! 🧹\n\nHey there! Welcome to Zevoir Support!\nHow can I help you today? 😊", "flow");
      }, 200);
    }

    // ── WELCOME MESSAGE ────────────────────────────────────────
    window.addEventListener("load", () => {
      setTimeout(() => {
        addMsg("bot",
          "Hey there! Welcome to Zevoir Support! 👋\n\n" +
          "I'm Zevoir Genie — powered by RAG and Claude AI.\n\n" +
          "I can answer questions about:\n" +
          "🚀 Our AI services and solutions\n" +
          "💰 Pricing and packages\n" +
          "🔐 Account and support issues\n" +
          "📋 Todo stats — just type a number (1–10)!\n\n" +
          "What can I help you with today?",
          "flow"
        );
      }, 500);
    });
  </script>
</body>
</html>
