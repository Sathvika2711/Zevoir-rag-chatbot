name: Run Zevoir Tests

# Trigger: run this workflow on every push and pull request
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out your code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest flask numpy

      # Step 4: Run pytest
      # We only run test_rag.py here because test_app.py needs
      # the full app context. test_rag.py tests pure functions
      # and runs perfectly in CI without any API keys.
      - name: Run tests
        run: |
          pytest tests/test_rag.py -v
